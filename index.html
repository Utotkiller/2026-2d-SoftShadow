<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soft Shadow Lighting</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <canvas id="scene" aria-label="2D soft shadow lighting demo"></canvas>

    <section class="hud" aria-label="Controls">
      <h1>Soft Shadow Lighting</h1>
      <p><strong>Move:</strong> WASD / arrows</p>
      <p><strong>Mouse:</strong> hold to move toward pointer</p>
      <p><strong>Boxes:</strong> collide and can be pushed</p>
      <p><strong>D:</strong> debug rays</p>
      <p><strong>R:</strong> reset layout</p>
      <p><strong>[ / ]:</strong> shadow softness</p>
      <p><strong>- / =:</strong> light radius</p>
    </section>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
